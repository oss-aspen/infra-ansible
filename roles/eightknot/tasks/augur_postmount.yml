- name: Load extra variables
  ansible.builtin.include_vars:
    file: secrets.yml

- name: Remove a PostgreSQL replication slot
  community.postgresql.postgresql_query:
    login_db: augur
    login_host: "localhost"
    login_user: "{{ augur_pg_container_user }}"
    login_password: "{{ augur_pg_password }}"
    query: "SELECT pg_drop_replication_slot('fivetran_pgoutput_slot')"
  register: slot_result
  failed_when:
    - slot_result.msg is defined
    - "'does not exist' not in slot_result.msg"

