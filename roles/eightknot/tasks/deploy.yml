- name: Configure system for 8Knot
  ansible.builtin.include_role:
    name: eightknot
    tasks_from: environment
- name: Download 8Knot
  ansible.builtin.include_role:
    name: eightknot
    tasks_from: download
- name: Build the 8Knot container image
  ansible.builtin.include_role:
    name: eightknot
    tasks_from: build
- name: Deploy the 8Knot config files and container images
  ansible.builtin.include_role:
    name: eightknot
    tasks_from: configure
- name: restart 8Knot
  ansible.builtin.include_role:
    name: eightknot
    tasks_from: restart
