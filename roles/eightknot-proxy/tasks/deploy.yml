- name: Prepare location for caddy config files
  ansible.builtin.file:
    path: /opt/caddy/
    state: directory
    group: sudo
    owner: root
  become: true

- name: Write Caddyfile using jinja2
  ansible.builtin.template:
    src: templates/Caddyfile.j2
    dest: /opt/caddy/Caddyfile
    mode: "0640"
    group: sudo
    owner: root
  become: true
  register: caddyfile_config

- name: Prepare location for compose files
  ansible.builtin.file:
    path: "{{ compose_path }}"
    state: directory
    mode: "0755"
    owner: root
  become: true

- name: Write compose file using jinja2
  ansible.builtin.template:
    src: templates/compose.yml.j2
    dest: "{{ compose_path }}/compose.yml"
    mode: "0640"
    group: sudo
    owner: root
  become: true
  register: compose_config

- name: Restart caddy proxy service
  community.docker.docker_compose_v2:
    project_src: "{{ compose_path }}"
    pull: missing
    state: restarted
  when: compose_config.changed or caddyfile_config.changed
