augur_git_clone_path: /opt/git/collectoss
git_clone_url: https://github.com/chaoss/collectoss
compose_path: /opt/compose/collectoss
compose_file: docker-compose.yml

source_device_disk: "/dev/nvme2n1"
# fallback value in case one cant be determined from the mount point (i.e. because it isnt mounted)
source_device_partition: "{{source_device_disk}}p1"

postgres_data_mount_point: "/opt/augur/postgresql/data"
augur_config_data_mount_point: "/opt/augur/config"


augur_pg_container_name: "augur-augur-db-1"
augur_pg_container_user: "augur"
augur_pg_password: "{{ vault_augur_password }}"

augur_pull_version: "v1.0.0"
augur_tag_version: "{{ augur_pull_version  | replace('/', '-') }}"

augur_rabbit_username: augur
augur_rabbit_password: "{{ vault_rabbitmq_password }}"
augur_rabbit_vhost: collectoss_vhost